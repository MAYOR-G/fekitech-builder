services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fekitech_builder
      POSTGRES_USER: fekitech
      POSTGRES_PASSWORD: fekitech_local_only
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fekitech -d fekitech_builder"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - fekitech-postgres-data:/var/lib/postgresql/data

volumes:
  fekitech-postgres-data:
